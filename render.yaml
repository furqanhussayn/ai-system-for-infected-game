services:
  - type: web
    name: team-a-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: AI_MODE
        value: rules
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        value: ""
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: LLM_TIMEOUT_SECONDS
        value: "8"